<canvas width="1200" height="800"></canvas>

<script>

    // =====================================
    // CANVAS
    // =====================================

    var tela = document.querySelector("canvas");

    var pincel = tela.getContext("2d");

    var largura = 1200;

    var altura = 800;

    // =====================================
    // GAME
    // =====================================

    var raio = 28;

    var xAleatorio;

    var yAleatorio;

    var pontos = 0;

    var tiros = 20;

    var velocidade = 1000;

    var intervalo;

    // =====================================
    // FUNDO
    // =====================================

    var fundo = new Image();

    fundo.src = "faroeste.png";

    // =====================================
    // TEXTO
    // =====================================

    function desenhaTexto(texto, x, y, tamanho = 30){

        pincel.font = tamanho + "px Arial";

        pincel.fillStyle = "white";

        pincel.strokeStyle = "black";

        pincel.lineWidth = 5;

        pincel.strokeText(texto, x, y);

        pincel.fillText(texto, x, y);
    }

    // =====================================
    // CIRCULO
    // =====================================

    function desenhaCirculo(x, y, raio, cor){

        pincel.fillStyle = cor;

        pincel.beginPath();

        pincel.arc(
            x,
            y,
            raio,
            0,
            2 * Math.PI
        );

        pincel.fill();
    }

    // =====================================
    // ALVO PENDURADO
    // =====================================

    function desenhaAlvo(x, y){

        // corrente

        pincel.strokeStyle = "#222";

        pincel.lineWidth = 6;

        pincel.beginPath();

        pincel.moveTo(x, y - 100);

        pincel.lineTo(x, y - 45);

        pincel.stroke();

        // placa madeira

        pincel.fillStyle = "#7a4a21";

        pincel.fillRect(
            x - 50,
            y - 50,
            100,
            100
        );

        // borda madeira

        pincel.strokeStyle = "#3d220f";

        pincel.lineWidth = 4;

        pincel.strokeRect(
            x - 50,
            y - 50,
            100,
            100
        );

        // linhas madeira

        pincel.strokeStyle = "#5a3417";

        pincel.lineWidth = 2;

        for(var i = 0; i < 5; i++){

            pincel.beginPath();

            pincel.moveTo(
                x - 50,
                y - 40 + (i * 20)
            );

            pincel.lineTo(
                x + 50,
                y - 40 + (i * 20)
            );

            pincel.stroke();
        }

        // alvo

        desenhaCirculo(
            x,
            y,
            30,
            "#b22222"
        );

        desenhaCirculo(
            x,
            y,
            22,
            "#f5deb3"
        );

        desenhaCirculo(
            x,
            y,
            14,
            "#b22222"
        );

        desenhaCirculo(
            x,
            y,
            6,
            "#ffd700"
        );
    }

    // =====================================
    // BALA BONITA
    // =====================================

    function desenhaBala(x, y){

        // sombra

        pincel.fillStyle = "rgba(0,0,0,0.25)";

        pincel.fillRect(
            x + 2,
            y + 2,
            18,
            32
        );

        // ponta dourada

        pincel.fillStyle = "#f4d03f";

        pincel.beginPath();

        pincel.moveTo(x + 9, y);

        pincel.lineTo(x + 18, y + 12);

        pincel.lineTo(x, y + 12);

        pincel.fill();

        // corpo cobre

        pincel.fillStyle = "#b87333";

        pincel.fillRect(
            x,
            y + 12,
            18,
            20
        );

        // detalhe inferior

        pincel.fillStyle = "#8b5a2b";

        pincel.fillRect(
            x,
            y + 26,
            18,
            6
        );

        // brilho

        pincel.fillStyle = "rgba(255,255,255,0.35)";

        pincel.fillRect(
            x + 3,
            y + 14,
            3,
            10
        );

        // borda

        pincel.strokeStyle = "#3d220f";

        pincel.lineWidth = 2;

        pincel.strokeRect(
            x,
            y + 12,
            18,
            20
        );
    }

    // =====================================
    // HUD
    // =====================================

    function desenhaHUD(){

        desenhaTexto(
            "🔫 BANG BANG",
            20,
            50,
            40
        );

        desenhaTexto(
            "PONTOS: " + pontos,
            20,
            110
        );

        desenhaTexto(
            "VELOCIDADE: " + velocidade + "ms",
            20,
            160
        );

        desenhaTexto(
            "MUNIÇÃO:",
            20,
            220
        );

        // balas

        for(var i = 0; i < tiros; i++){

            desenhaBala(
                170 + (i * 28),
                190
            );
        }
    }

    // =====================================
    // LIMPA
    // =====================================

    function limpaTela(){

        pincel.clearRect(
            0,
            0,
            largura,
            altura
        );
    }

    // =====================================
    // POSIÇÕES
    // =====================================

    function sorteaPosicaoX(){

        return Math.floor(
            Math.random() * 650
        ) + 280;
    }

    function sorteaPosicaoY(){

        return Math.floor(
            Math.random() * 280
        ) + 260;
    }

    // =====================================
    // UPDATE
    // =====================================

    function atualizaTela(){

        limpaTela();

        // fundo

        pincel.drawImage(
            fundo,
            0,
            0,
            largura,
            altura
        );

        // alvo

        xAleatorio = sorteaPosicaoX();

        yAleatorio = sorteaPosicaoY();

        desenhaAlvo(
            xAleatorio,
            yAleatorio
        );

        // hud

        desenhaHUD();
    }

    // =====================================
    // DIFICULDADE
    // =====================================

    function aumentaDificuldade(){

        clearInterval(intervalo);

        if(
            pontos % 5 == 0
            && velocidade > 250
        ){

            velocidade -= 150;
        }

        intervalo = setInterval(
            atualizaTela,
            velocidade
        );
    }

    // =====================================
    // GAME OVER
    // =====================================

    function gameOver(){

        clearInterval(intervalo);

        limpaTela();

        pincel.drawImage(
            fundo,
            0,
            0,
            largura,
            altura
        );

        desenhaTexto(
            "GAME OVER 💀",
            360,
            350,
            80
        );

        desenhaTexto(
            "PONTOS: " + pontos,
            450,
            430,
            45
        );
    }

    // =====================================
    // VITÓRIA
    // =====================================

    function venceu(){

        clearInterval(intervalo);

        limpaTela();

        pincel.drawImage(
            fundo,
            0,
            0,
            largura,
            altura
        );

        desenhaTexto(
            "BANG BANG 🔥",
            300,
            320,
            90
        );

        desenhaTexto(
            "VOCÊ ACERTOU TODOS OS TIROS!",
            150,
            430,
            50
        );
    }

    // =====================================
    // TIRO
    // =====================================

    function dispara(evento){

        if(tiros <= 0){

            gameOver();

            return;
        }

        tiros--;

        var x = evento.pageX - tela.offsetLeft;

        var y = evento.pageY - tela.offsetTop;

        // acertou

        if(
            (x > xAleatorio - raio)
            && (x < xAleatorio + raio)
            && (y > yAleatorio - raio)
            && (y < yAleatorio + raio)
        ){

            pontos++;

            aumentaDificuldade();
        }

        atualizaTela();

        // vitória perfeita

        if(
            pontos == 20
            && tiros == 0
        ){

            venceu();

            return;
        }

        // derrota

        if(tiros <= 0){

            gameOver();
        }
    }

    // =====================================
    // START
    // =====================================

    fundo.onload = function(){

        intervalo = setInterval(
            atualizaTela,
            velocidade
        );
    }

    tela.onclick = dispara;

</script>
